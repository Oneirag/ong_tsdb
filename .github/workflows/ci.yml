name: CI
on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .
      - name: Run unit tests
        env:
          ONG_CONFIG_PATH: ${{ github.workspace }}/.ci-config
        run: |
          mkdir -p "$ONG_CONFIG_PATH"
          cat > "$ONG_CONFIG_PATH/ong_tsdb.yml" <<EOF
          ong_tsdb:
            BASE_DIR: $ONG_CONFIG_PATH/data
            admin_token: ci_admin
            read_token: ci_read
            write_token: ci_write
            uncompressed_chunks: 10
          EOF
          mkdir -p "$ONG_CONFIG_PATH/data"
          pytest tests/ \
            --ignore=tests/test_remote_server.py \
            --ignore=tests/test_client.py \
            --cov=src/ong_tsdb \
            --cov-report=term-missing
